<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t('login_title') }} — {{ t('app_title') }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
  {% if lang == 'ru' %}
    <a href="{{ url_for('set_lang', lang='en') }}" class="login-lang-btn">EN</a>
  {% else %}
    <a href="{{ url_for('set_lang', lang='ru') }}" class="login-lang-btn">RU</a>
  {% endif %}
  <div class="login-container">
    <div class="login-logo">&#x1f6e1;</div>
    <h1>{{ t('app_title') }}</h1>
    <p class="login-subtitle">{{ t('app_subtitle') }} (Python)</p>
    {% if error %}
      <div class="login-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>{{ t('login_username') }}</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label>{{ t('login_password') }}</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn-primary">{{ t('login_submit') }}</button>
    </form>
  </div>
</body>
</html>
